<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoViz - Algorithm Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           CSS VARIABLES & RESET
           ======================================== */
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --color-comparing: #fbbf24;
            --color-swapping: #f97316;
            --color-sorted: #22c55e;
            --color-default: #6366f1;
            --color-searching: #a855f7;
            --grid-wall: #475569;
            --grid-start: #22c55e;
            --grid-end: #ef4444;
            --grid-visited: #38bdf8;
            --grid-path: #fbbf24;
            --grid-current: #f472b6;
            --border-color: #334155;
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========================================
           LAYOUT
           ======================================== */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* ========================================
           HEADER
           ======================================== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            -webkit-text-fill-color: white;
        }

        /* ========================================
           CATEGORY TABS
           ======================================== */
        .category-tabs {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-primary);
            padding: 0.25rem;
            border-radius: 12px;
        }

        .category-tab {
            padding: 0.625rem 1.25rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all var(--transition-fast);
        }

        .category-tab:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .category-tab.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            box-shadow: var(--shadow-glow);
        }

        /* ========================================
           MAIN CONTENT AREA
           ======================================== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1rem;
            flex: 1;
            min-height: 0;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* ========================================
           VISUALIZATION STAGE
           ======================================== */
        .visualization-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .visualization-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .algorithm-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .algo-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all var(--transition-fast);
        }

        .algo-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .algo-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .visualization-stage {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 12px;
            min-height: 300px;
            position: relative;
            overflow: hidden;
        }

        /* Sorting Bars */
        .bar {
            flex: 1;
            max-width: 60px;
            min-width: 4px;
            background: linear-gradient(180deg, var(--color-default), #4338ca);
            border-radius: 4px 4px 0 0;
            transition: height 0.1s ease, background 0.15s ease, transform 0.15s ease;
            position: relative;
        }

        .bar::after {
            content: attr(data-value);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.625rem;
            color: var(--text-muted);
            padding-bottom: 4px;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .visualization-stage:hover .bar::after {
            opacity: 1;
        }

        .bar.comparing {
            background: linear-gradient(180deg, var(--color-comparing), #d97706);
            transform: scaleY(1.02);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }

        .bar.swapping {
            background: linear-gradient(180deg, var(--color-swapping), #ea580c);
            transform: scaleY(1.05);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.6);
        }

        .bar.sorted {
            background: linear-gradient(180deg, var(--color-sorted), #16a34a);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
        }

        .bar.searching {
            background: linear-gradient(180deg, var(--color-searching), #7c3aed);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        .bar.found {
            background: linear-gradient(180deg, var(--color-sorted), #16a34a);
            transform: scaleY(1.1);
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.7);
            animation: pulse 0.5s ease infinite alternate;
        }

        .bar.not-found {
            background: linear-gradient(180deg, #ef4444, #dc2626);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse {
            from { transform: scaleY(1.1); }
            to { transform: scaleY(1.15); }
        }

        /* Pathfinding Grid */
        .pathfinding-grid {
            display: none;
            grid-template-columns: repeat(20, 1fr);
            gap: 1px;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 4px;
            margin: auto;
        }

        .pathfinding-grid.active {
            display: grid;
        }

        .grid-cell {
            background: var(--bg-secondary);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
        }

        .grid-cell:hover {
            background: var(--bg-tertiary);
        }

        .grid-cell.wall {
            background: var(--grid-wall);
        }

        .grid-cell.start {
            background: var(--grid-start);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
        }

        .grid-cell.end {
            background: var(--grid-end);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
        }

        .grid-cell.visited {
            background: var(--grid-visited);
            animation: visitedPulse 0.3s ease;
        }

        .grid-cell.path {
            background: var(--grid-path);
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
            animation: pathPulse 0.3s ease;
        }

        .grid-cell.current {
            background: var(--grid-current);
            box-shadow: 0 0 12px rgba(244, 114, 182, 0.7);
        }

        @keyframes visitedPulse {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pathPulse {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            width: 100%;
            height: 100%;
        }

        .bars-container.hidden {
            display: none;
        }

        /* ========================================
           INFO PANEL (Sidebar)
           ======================================== */
        .info-panel {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            height: fit-content;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .info-section {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 1rem;
        }

        .info-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .algorithm-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .algorithm-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Complexity Badges */
        .complexity-badges {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border-radius: 10px;
            flex: 1;
            min-width: 100px;
        }

        .badge-label {
            font-size: 0.6875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .badge-value {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        /* Stats Counters */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: 0.75rem;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-purple);
        }

        .stat-label {
            font-size: 0.6875rem;
            font-weight: 500;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Pseudocode Panel */
        .pseudocode {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            line-height: 1.8;
            max-height: 200px;
            overflow-y: auto;
        }

        .pseudocode-line {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            transition: all var(--transition-fast);
            white-space: pre;
        }

        .pseudocode-line.active {
            background: rgba(251, 191, 36, 0.2);
            color: var(--color-comparing);
            font-weight: 500;
        }

        /* ========================================
           CONTROLS PANEL
           ======================================== */
        .controls-panel {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 1.25rem 1.5rem;
            margin-top: 1rem;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .controls-row + .controls-row {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        /* Playback Buttons */
        .playback-controls {
            display: flex;
            gap: 0.5rem;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1.125rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: var(--bg-primary);
            transform: translateY(-2px);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .control-btn.primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            width: 56px;
        }

        .control-btn.primary:hover {
            box-shadow: var(--shadow-glow);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Sliders */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .slider-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 50%;
            cursor: pointer;
            transition: transform var(--transition-fast);
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .slider-value {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-cyan);
            min-width: 40px;
        }

        /* Custom Input */
        .custom-input-group {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            max-width: 400px;
        }

        .custom-input {
            flex: 1;
            padding: 0.625rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .custom-input:focus {
            border-color: var(--accent-blue);
        }

        .custom-input::placeholder {
            color: var(--text-muted);
        }

        .input-btn {
            padding: 0.625rem 1rem;
            border: none;
            border-radius: 10px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .input-btn:hover {
            background: var(--accent-blue);
        }

        .input-btn.accent {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
        }

        /* Search Input for Searching Algorithm */
        .search-input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-input-group label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .search-target-input {
            width: 80px;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            outline: none;
        }

        .search-target-input:focus {
            border-color: var(--accent-blue);
        }

        /* Grid Controls */
        .grid-controls {
            display: none;
            gap: 0.5rem;
        }

        .grid-controls.active {
            display: flex;
        }

        .grid-mode-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .grid-mode-btn:hover {
            border-color: var(--accent-blue);
        }

        .grid-mode-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        /* ========================================
           COMPLETION ANIMATION
           ======================================== */
        .celebration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ========================================
           STATUS MESSAGE
           ======================================== */
        .status-message {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 1rem 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .status-message.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .status-message.success {
            border-color: var(--color-sorted);
            color: var(--color-sorted);
        }

        .status-message.error {
            border-color: #ef4444;
            color: #ef4444;
        }

        .status-message.info {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* ========================================
           SCROLLBAR
           ======================================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 768px) {
            .app-container {
                padding: 0.5rem;
            }

            .header {
                padding: 1rem;
            }

            .logo {
                font-size: 1.25rem;
            }

            .category-tab {
                padding: 0.5rem 0.875rem;
                font-size: 0.8125rem;
            }

            .visualization-container {
                padding: 1rem;
            }

            .info-panel {
                max-height: none;
            }

            .controls-panel {
                padding: 1rem;
            }

            .slider {
                width: 80px;
            }

            .custom-input-group {
                max-width: none;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <span>AlgoViz</span>
            </div>
            <div class="category-tabs">
                <button class="category-tab active" data-category="sorting">Sorting</button>
                <button class="category-tab" data-category="searching">Searching</button>
                <button class="category-tab" data-category="pathfinding">Pathfinding</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Visualization Area -->
            <div class="visualization-container">
                <div class="visualization-header">
                    <div class="algorithm-selector" id="algorithmSelector">
                        <!-- Populated by JS -->
                    </div>
                </div>
                <div class="visualization-stage" id="visualizationStage">
                    <div class="bars-container" id="barsContainer">
                        <!-- Bars populated by JS -->
                    </div>
                    <div class="pathfinding-grid" id="pathfindingGrid">
                        <!-- Grid cells populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Info Panel -->
            <aside class="info-panel">
                <div class="info-section">
                    <div class="info-title">Algorithm</div>
                    <div class="algorithm-name" id="algorithmName">Bubble Sort</div>
                    <div class="algorithm-description" id="algorithmDescription">
                        Repeatedly steps through the list, compares adjacent elements, and swaps them if they are in the wrong order.
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-title">Complexity</div>

        <div class="controls-panel">

                    <span class="slider-label">Size:</span>
