    <!-- Status Message -->
    <div class="status-message" id="statusMessage"></div>

    <!-- Celebration Overlay -->
    <div class="celebration-overlay" id="celebrationOverlay"></div>

    <script>
        /**
         * =====================================================
         * AlgoViz - Algorithm Visualizer
         * A production-quality, single-file web application
         * =====================================================
         * 
         * Architecture:
         * - App: Main controller managing state and UI
         * - Algorithms: Individual algorithm implementations
         * - Visualizer: Rendering logic for bars and grid
         * - HistoryManager: Manages state snapshots for time travel
         */

        // =====================================================
        // UTILITY FUNCTIONS
        // =====================================================

        /**
         * Async sleep function for throttling algorithm execution
         * @param {number} ms - Milliseconds to wait
         * @returns {Promise} Resolves after the specified delay
         */
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        /**
         * Generate random integer between min and max (inclusive)
         */
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        /**
         * Generate random array of specified size
         */
        const generateRandomArray = (size, min = 5, max = 100) => {
            return Array.from({ length: size }, () => randomInt(min, max));
        };

        /**
         * Deep clone an array or object
         */
        const deepClone = (obj) => JSON.parse(JSON.stringify(obj));

        // =====================================================
        // ALGORITHM DEFINITIONS
        // =====================================================

        const ALGORITHMS = {
            sorting: {
                bubble: {
                    name: 'Bubble Sort',
                    description: 'Repeatedly steps through the list, compares adjacent elements, and swaps them if they are in the wrong order. Simple but inefficient for large datasets.',
                    timeComplexity: 'O(n²)',
                    spaceComplexity: 'O(1)',
                    pseudocode: [
                        'for i = 0 to n-1:',
                        '  for j = 0 to n-i-2:',
                        '    if arr[j] > arr[j+1]:',
                        '      swap(arr[j], arr[j+1])'
                    ]
                },
                selection: {
                    name: 'Selection Sort',
                    description: 'Divides the input into a sorted and unsorted region. Repeatedly selects the smallest element from the unsorted region and moves it to the sorted region.',
                    timeComplexity: 'O(n²)',
                    spaceComplexity: 'O(1)',
                    pseudocode: [
                        'for i = 0 to n-1:',
                        '  minIdx = i',
                        '  for j = i+1 to n:',
                        '    if arr[j] < arr[minIdx]:',
                        '      minIdx = j',
                        '  swap(arr[i], arr[minIdx])'
                    ]
                },
                insertion: {
                    name: 'Insertion Sort',
                    description: 'Builds the final sorted array one item at a time. Efficient for small datasets or nearly sorted arrays.',
                    timeComplexity: 'O(n²)',
                    spaceComplexity: 'O(1)',
                    pseudocode: [
                        'for i = 1 to n:',
                        '  key = arr[i]',
                        '  j = i - 1',
                        '  while j >= 0 and arr[j] > key:',
                        '    arr[j+1] = arr[j]',
                        '    j = j - 1',
                        '  arr[j+1] = key'
                    ]
                },
                merge: {
                    name: 'Merge Sort',
                    description: 'Divide-and-conquer algorithm that divides the array into halves, sorts them, and merges them back. Guaranteed O(n log n) performance.',
                    timeComplexity: 'O(n log n)',
                    spaceComplexity: 'O(n)',
                    pseudocode: [
                        'mergeSort(arr, l, r):',
                        '  if l < r:',
                        '    m = (l+r)/2',
                        '    mergeSort(arr, l, m)',
                        '    mergeSort(arr, m+1, r)',
                        '    merge(arr, l, m, r)'
                    ]
                },
                quick: {
                    name: 'Quick Sort',
                    description: 'Divide-and-conquer algorithm that picks a pivot element and partitions the array around it. Very efficient in practice.',
                    timeComplexity: 'O(n log n)',
                    spaceComplexity: 'O(log n)',
                    pseudocode: [
                        'quickSort(arr, low, high):',
                        '  if low < high:',
                        '    pi = partition(arr, low, high)',
                        '    quickSort(arr, low, pi-1)',
                        '    quickSort(arr, pi+1, high)'
                    ]
                }
            },
            searching: {
                linear: {
                    name: 'Linear Search',
                    description: 'Sequentially checks each element until a match is found or the whole list has been searched. Works on unsorted arrays.',
                    timeComplexity: 'O(n)',
                    spaceComplexity: 'O(1)',
                    pseudocode: [
                        'linearSearch(arr, target):',
                        '  for i = 0 to n-1:',
                        '    if arr[i] == target:',
                        '      return i',
                        '  return -1'
                    ]
                },
                binary: {
                    name: 'Binary Search',
                    description: 'Efficiently finds a target value in a sorted array by repeatedly dividing the search interval in half.',
                    timeComplexity: 'O(log n)',
                    spaceComplexity: 'O(1)',
                    pseudocode: [
                        'binarySearch(arr, target):',
                        '  low = 0, high = n-1',
                        '  while low <= high:',
                        '    mid = (low+high)/2',
                        '    if arr[mid] == target: return mid',
                        '    if arr[mid] < target: low = mid+1',
                        '    else: high = mid-1',
                        '  return -1'
                    ]
                }
            },
            pathfinding: {
                bfs: {
                    name: 'BFS (Breadth-First)',
                    description: 'Explores all neighbors at the current depth before moving to nodes at the next depth level. Guarantees shortest path in unweighted graphs.',
                    timeComplexity: 'O(V + E)',
                    spaceComplexity: 'O(V)',
                    pseudocode: [
                        'BFS(grid, start, end):',
                        '  queue = [start]',
                        '  visited = {}',
                        '  while queue not empty:',
                        '    node = queue.dequeue()',
                        '    if node == end: return path',
                        '    for each neighbor of node:',
                        '      if not visited:',
                        '        visited.add(neighbor)',
                        '        queue.enqueue(neighbor)'
                    ]
                },
                dfs: {
                    name: 'DFS (Depth-First)',
                    description: 'Explores as far as possible along each branch before backtracking. Uses less memory than BFS but may not find shortest path.',
                    timeComplexity: 'O(V + E)',
                    spaceComplexity: 'O(V)',
                    pseudocode: [
                        'DFS(grid, node, end):',
                        '  visited.add(node)',
                        '  if node == end: return true',
                        '  for each neighbor of node:',
                        '    if not visited:',
                        '      if DFS(grid, neighbor, end):',
                        '        return true',
                        '  return false'
                    ]
                }
            }
        };

        // =====================================================
        // HISTORY MANAGER - For time travel / step back
        // =====================================================

        class HistoryManager {
            constructor() {
                this.history = [];
                this.currentIndex = -1;
            }

            /**
             * Save a state snapshot
             * @param {Object} state - The state to save
             */
            push(state) {
                // Remove any future states if we're not at the end
                this.history = this.history.slice(0, this.currentIndex + 1);
                this.history.push(deepClone(state));
                this.currentIndex = this.history.length - 1;
            }

            /**
             * Go back one step
             * @returns {Object|null} Previous state or null if at beginning
             */
            back() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    return deepClone(this.history[this.currentIndex]);
                }
                return null;
            }

            /**
             * Go forward one step
             * @returns {Object|null} Next state or null if at end
             */
            forward() {
                if (this.currentIndex < this.history.length - 1) {
                    this.currentIndex++;
                    return deepClone(this.history[this.currentIndex]);
                }
                return null;
            }

            /**
             * Get current state
             */
            current() {
                return this.currentIndex >= 0 ? deepClone(this.history[this.currentIndex]) : null;
            }

            /**
             * Reset history
             */
            reset() {
                this.history = [];
                this.currentIndex = -1;
            }

            /**
             * Check if can go back
             */
            canGoBack() {
                return this.currentIndex > 0;
            }

            /**
             * Check if can go forward
             */
            canGoForward() {
                return this.currentIndex < this.history.length - 1;
            }
        }

        // =====================================================
        // MAIN APPLICATION
        // =====================================================

        const App = (() => {
            // =====================================================
            // STATE
            // =====================================================
            const state = {
                category: 'sorting',
                algorithm: 'bubble',
                array: [],
                originalArray: [],
                isRunning: false,
                isPaused: false,
                speed: 50,
                size: 30,
                searchTarget: null,
                comparisons: 0,
                swaps: 0,
                currentLine: -1,
                highlightedIndices: [],
                sortedIndices: [],
                // Pathfinding state
                grid: [],
                gridSize: 20,
                startPos: { row: 5, col: 3 },
                endPos: { row: 14, col: 16 },
                gridMode: 'wall', // wall, start, end, clear
                visitedCells: [],
                pathCells: [],
                currentCell: null
            };

            // History manager for step back functionality
            const history = new HistoryManager();

            // Abort controller for stopping running algorithms
            let abortController = null;

            // =====================================================
            // DOM ELEMENTS
            // =====================================================
            const elements = {
                categoryTabs: document.querySelectorAll('.category-tab'),
                algorithmSelector: document.getElementById('algorithmSelector'),
                barsContainer: document.getElementById('barsContainer'),
                pathfindingGrid: document.getElementById('pathfindingGrid'),
                algorithmName: document.getElementById('algorithmName'),
                algorithmDescription: document.getElementById('algorithmDescription'),
                timeComplexity: document.getElementById('timeComplexity'),
                spaceComplexity: document.getElementById('spaceComplexity'),
                comparisons: document.getElementById('comparisons'),
                swaps: document.getElementById('swaps'),
                pseudocode: document.getElementById('pseudocode'),
                btnPlayPause: document.getElementById('btnPlayPause'),
                btnStepBack: document.getElementById('btnStepBack'),
                btnStepForward: document.getElementById('btnStepForward'),
                btnReset: document.getElementById('btnReset'),
                speedSlider: document.getElementById('speedSlider'),
                speedValue: document.getElementById('speedValue'),
                sizeSlider: document.getElementById('sizeSlider'),
                sizeValue: document.getElementById('sizeValue'),
                arraySizeGroup: document.getElementById('arraySizeGroup'),
                searchInputGroup: document.getElementById('searchInputGroup'),
                searchTarget: document.getElementById('searchTarget'),
                customInput: document.getElementById('customInput'),
                btnApply: document.getElementById('btnApply'),
                btnRandom: document.getElementById('btnRandom'),
                gridControls: document.getElementById('gridControls'),
                customInputGroup: document.getElementById('customInputGroup'),
                statusMessage: document.getElementById('statusMessage'),
                celebrationOverlay: document.getElementById('celebrationOverlay')
            };

            // =====================================================
            // INITIALIZATION
            // =====================================================

            function init() {
                setupEventListeners();
                updateAlgorithmSelector();
                generateNewArray();
                initializeGrid();
                updateUI();
            }

            function setupEventListeners() {
                // Category tabs
                elements.categoryTabs.forEach(tab => {
                    tab.addEventListener('click', () => switchCategory(tab.dataset.category));
                });

                // Playback controls
                elements.btnPlayPause.addEventListener('click', togglePlayPause);
                elements.btnStepBack.addEventListener('click', stepBack);
                elements.btnStepForward.addEventListener('click', stepForward);
                elements.btnReset.addEventListener('click', reset);

                // Sliders
                elements.speedSlider.addEventListener('input', (e) => {
                    state.speed = 101 - parseInt(e.target.value);
                    elements.speedValue.textContent = `${state.speed}ms`;
                });

                elements.sizeSlider.addEventListener('input', (e) => {
                    state.size = parseInt(e.target.value);
                    elements.sizeValue.textContent = state.size;
                    if (!state.isRunning) {
                        generateNewArray();
                    }
                });

                // Custom input
                elements.btnApply.addEventListener('click', applyCustomInput);
                elements.btnRandom.addEventListener('click', generateNewArray);
                elements.customInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') applyCustomInput();
                });

                // Search target
                elements.searchTarget.addEventListener('change', (e) => {
                    state.searchTarget = parseInt(e.target.value) || null;
                });

                // Grid mode buttons
                document.querySelectorAll('.grid-mode-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.grid-mode-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        state.gridMode = btn.dataset.mode;
                        if (state.gridMode === 'clear') {
                            clearGridPath();
                        }
                    });
                });
            }

            // =====================================================
            // CATEGORY & ALGORITHM SWITCHING
            // =====================================================

            function switchCategory(category) {
                if (state.isRunning) {
                    stopAlgorithm();
                }

                state.category = category;
                
                // Update tab styles
                elements.categoryTabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.category === category);
                });

                // Show/hide relevant controls
                const isPathfinding = category === 'pathfinding';
                const isSearching = category === 'searching';
                
                elements.barsContainer.classList.toggle('hidden', isPathfinding);
                elements.pathfindingGrid.classList.toggle('active', isPathfinding);
                elements.gridControls.classList.toggle('active', isPathfinding);
                elements.arraySizeGroup.style.display = isPathfinding ? 'none' : 'flex';
                elements.customInputGroup.style.display = isPathfinding ? 'none' : 'flex';
                elements.searchInputGroup.style.display = isSearching ? 'flex' : 'none';

                // Update algorithm selector and select first algorithm
                updateAlgorithmSelector();
                const algorithms = Object.keys(ALGORITHMS[category]);
                switchAlgorithm(algorithms[0]);

                reset();
            }

            function updateAlgorithmSelector() {
                const algorithms = ALGORITHMS[state.category];
                elements.algorithmSelector.innerHTML = '';

                Object.entries(algorithms).forEach(([key, algo]) => {
                    const btn = document.createElement('button');
                    btn.className = `algo-btn ${key === state.algorithm ? 'active' : ''}`;
                    btn.textContent = algo.name;
                    btn.addEventListener('click', () => switchAlgorithm(key));
                    elements.algorithmSelector.appendChild(btn);
                });
            }

            function switchAlgorithm(algorithm) {
                if (state.isRunning) {
                    stopAlgorithm();
                }

                state.algorithm = algorithm;

                // Update button styles
                document.querySelectorAll('.algo-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.textContent === ALGORITHMS[state.category][algorithm].name);
                });

                // For binary search, ensure array is sorted
                if (state.category === 'searching' && algorithm === 'binary') {
                    state.array = [...state.array].sort((a, b) => a - b);
                    state.originalArray = [...state.array];
                }

                updateUI();
                reset();
            }

            // =====================================================
            // ARRAY MANAGEMENT
            // =====================================================

            function generateNewArray() {
                if (state.isRunning) return;

                state.array = generateRandomArray(state.size);
                
                // For binary search, sort the array
                if (state.category === 'searching' && state.algorithm === 'binary') {
                    state.array.sort((a, b) => a - b);
                }
                
                state.originalArray = [...state.array];
                resetStats();
                renderBars();
            }

            function applyCustomInput() {
                if (state.isRunning) return;

                const input = elements.customInput.value.trim();
                if (!input) {
                    showStatus('Please enter some numbers', 'error');
                    return;
                }

                const numbers = input.split(/[,\s]+/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
                
                if (numbers.length === 0) {
                    showStatus('Invalid input. Use comma-separated numbers', 'error');
                    return;
                }

                if (numbers.length > 100) {
                    showStatus('Maximum 100 elements allowed', 'error');
                    return;
                }

                state.array = numbers;
                
                // For binary search, sort the array
                if (state.category === 'searching' && state.algorithm === 'binary') {
                    state.array.sort((a, b) => a - b);
                }
                
                state.originalArray = [...state.array];
                state.size = numbers.length;
                elements.sizeSlider.value = state.size;
                elements.sizeValue.textContent = state.size;
                
                resetStats();
                renderBars();
                showStatus(`Applied ${numbers.length} elements`, 'success');
            }

            // =====================================================
            // GRID MANAGEMENT (Pathfinding)
            // =====================================================

            function initializeGrid() {
                state.grid = [];
                elements.pathfindingGrid.innerHTML = '';

                for (let row = 0; row < state.gridSize; row++) {
                    state.grid[row] = [];
                    for (let col = 0; col < state.gridSize; col++) {
                        state.grid[row][col] = 0; // 0 = empty, 1 = wall
                        
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;
                        
                        cell.addEventListener('click', () => handleCellClick(row, col));
                        cell.addEventListener('mouseenter', (e) => {
                            if (e.buttons === 1) handleCellClick(row, col);
                        });
                        
                        elements.pathfindingGrid.appendChild(cell);
                    }
                }

                updateGridDisplay();
            }

            function handleCellClick(row, col) {
                if (state.isRunning) return;

                const isStart = row === state.startPos.row && col === state.startPos.col;
                const isEnd = row === state.endPos.row && col === state.endPos.col;

                switch (state.gridMode) {
                    case 'wall':
                        if (!isStart && !isEnd) {
                            state.grid[row][col] = state.grid[row][col] === 1 ? 0 : 1;
                        }
                        break;
                    case 'start':
                        if (!isEnd && state.grid[row][col] !== 1) {
                            state.startPos = { row, col };
                        }
                        break;
                    case 'end':
                        if (!isStart && state.grid[row][col] !== 1) {
                            state.endPos = { row, col };
                        }
                        break;
                }

                clearGridPath();
                updateGridDisplay();
            }

            function clearGridPath() {
                state.visitedCells = [];
                state.pathCells = [];
                state.currentCell = null;
                updateGridDisplay();
            }

            function updateGridDisplay() {
                const cells = elements.pathfindingGrid.querySelectorAll('.grid-cell');
                
                cells.forEach(cell => {
                    const row = parseInt(cell.dataset.row);
                    const col = parseInt(cell.dataset.col);
                    
                    cell.className = 'grid-cell';
                    
                    if (row === state.startPos.row && col === state.startPos.col) {
                        cell.classList.add('start');
                    } else if (row === state.endPos.row && col === state.endPos.col) {
                        cell.classList.add('end');
                    } else if (state.grid[row][col] === 1) {
                        cell.classList.add('wall');
                    } else if (state.pathCells.some(c => c.row === row && c.col === col)) {
                        cell.classList.add('path');
                    } else if (state.currentCell && state.currentCell.row === row && state.currentCell.col === col) {
                        cell.classList.add('current');
                    } else if (state.visitedCells.some(c => c.row === row && c.col === col)) {
                        cell.classList.add('visited');
                    }
                });
            }

            // =====================================================
            // VISUALIZATION RENDERING
            // =====================================================

            function renderBars() {
                const maxValue = Math.max(...state.array);
                elements.barsContainer.innerHTML = '';

                state.array.forEach((value, index) => {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = `${(value / maxValue) * 100}%`;
                    bar.dataset.value = value;
                    
                    // Apply states
                    if (state.sortedIndices.includes(index)) {
                        bar.classList.add('sorted');
                    }
                    if (state.highlightedIndices.includes(index)) {
                        bar.classList.add('comparing');
                    }
                    
                    elements.barsContainer.appendChild(bar);
                });
            }

            function highlightBars(indices, className = 'comparing') {
                const bars = elements.barsContainer.querySelectorAll('.bar');
                bars.forEach((bar, i) => {
                    bar.classList.remove('comparing', 'swapping', 'searching', 'found', 'not-found');
                    if (indices.includes(i)) {
                        bar.classList.add(className);
                    }
                    if (state.sortedIndices.includes(i)) {
                        bar.classList.add('sorted');
                    }
                });
            }

            function markSorted(indices) {
                indices.forEach(i => {
                    if (!state.sortedIndices.includes(i)) {
                        state.sortedIndices.push(i);
                    }
                });
                const bars = elements.barsContainer.querySelectorAll('.bar');
                indices.forEach(i => {
                    if (bars[i]) bars[i].classList.add('sorted');
                });
            }

            // =====================================================
            // UI UPDATES
            // =====================================================

            function updateUI() {
                const algo = ALGORITHMS[state.category][state.algorithm];
                
                elements.algorithmName.textContent = algo.name;
                elements.algorithmDescription.textContent = algo.description;
                elements.timeComplexity.textContent = algo.timeComplexity;
                elements.spaceComplexity.textContent = algo.spaceComplexity;
                
                updatePseudocode();
                updateStats();
                updateButtonStates();
            }

            function updatePseudocode(activeLine = -1) {
                const algo = ALGORITHMS[state.category][state.algorithm];
                elements.pseudocode.innerHTML = algo.pseudocode.map((line, i) => {
                    const isActive = i === activeLine;
                    return `<div class="pseudocode-line ${isActive ? 'active' : ''}">${line}</div>`;
                }).join('');
            }

            function updateStats() {
                elements.comparisons.textContent = state.comparisons;
                elements.swaps.textContent = state.swaps;
            }

            function resetStats() {
                state.comparisons = 0;
                state.swaps = 0;
                state.currentLine = -1;
                state.highlightedIndices = [];
                state.sortedIndices = [];
                updateStats();
                updatePseudocode();
            }

            function updateButtonStates() {
                elements.btnPlayPause.textContent = state.isRunning && !state.isPaused ? '⏸' : '▶';
                elements.btnStepBack.disabled = !history.canGoBack() || state.isRunning;
                elements.btnStepForward.disabled = state.isRunning;
            }

            function showStatus(message, type = 'info') {
                elements.statusMessage.textContent = message;
                elements.statusMessage.className = `status-message ${type} visible`;
                
                setTimeout(() => {
                    elements.statusMessage.classList.remove('visible');
                }, 3000);
            }

            // =====================================================
            // PLAYBACK CONTROLS
            // =====================================================

            async function togglePlayPause() {
                if (state.isRunning) {
                    if (state.isPaused) {
                        state.isPaused = false;
                        updateButtonStates();
                    } else {
                        state.isPaused = true;
                        updateButtonStates();
                    }
                } else {
                    await runAlgorithm();
                }
            }

            function stopAlgorithm() {
                if (abortController) {
                    abortController.abort();
                    abortController = null;
                }
                state.isRunning = false;
                state.isPaused = false;
                updateButtonStates();
            }

            async function stepForward() {
                if (state.isRunning) return;

                // Check if we can step forward in history
                const nextState = history.forward();
                if (nextState) {
                    restoreState(nextState);
                    return;
                }

                // Otherwise, run one step of the algorithm
                state.isRunning = true;
                abortController = new AbortController();
                
                try {
                    await runSingleStep();
                } catch (e) {
                    if (e.name !== 'AbortError') console.error(e);
                }
                
                state.isRunning = false;
                updateButtonStates();
            }

            function stepBack() {
                const prevState = history.back();
                if (prevState) {
                    restoreState(prevState);
                }
            }

            function restoreState(savedState) {
                state.array = savedState.array;
                state.comparisons = savedState.comparisons;
                state.swaps = savedState.swaps;
                state.highlightedIndices = savedState.highlightedIndices || [];
                state.sortedIndices = savedState.sortedIndices || [];
                state.currentLine = savedState.currentLine;
                
                if (state.category === 'pathfinding') {
                    state.visitedCells = savedState.visitedCells || [];
                    state.pathCells = savedState.pathCells || [];
                    state.currentCell = savedState.currentCell;
                    updateGridDisplay();
                } else {
                    renderBars();
                }
                
                updateStats();
                updatePseudocode(state.currentLine);
                updateButtonStates();
            }

            function saveState(line = -1) {
                const snapshot = {
                    array: [...state.array],
                    comparisons: state.comparisons,
                    swaps: state.swaps,
                    highlightedIndices: [...state.highlightedIndices],
                    sortedIndices: [...state.sortedIndices],
                    currentLine: line,
                    visitedCells: [...state.visitedCells],
                    pathCells: [...state.pathCells],
                    currentCell: state.currentCell ? { ...state.currentCell } : null
                };
                history.push(snapshot);
            }

            function reset() {
                stopAlgorithm();
                history.reset();
                
                if (state.category === 'pathfinding') {
                    clearGridPath();
                } else {
                    state.array = [...state.originalArray];
                }
                
                resetStats();
                renderBars();
                updateUI();
            }

            // =====================================================
            // ALGORITHM EXECUTION
            // =====================================================

            /**
             * Main algorithm runner with async throttling
             * Uses await sleep(delay) for visual effect
             */
            async function runAlgorithm() {
                state.isRunning = true;
                state.isPaused = false;
                abortController = new AbortController();
                history.reset();
                resetStats();
                
                if (state.category !== 'pathfinding') {
                    state.array = [...state.originalArray];
                    renderBars();
                }
                
                updateButtonStates();
                saveState();

                try {
                    switch (state.category) {
                        case 'sorting':
                            await runSortingAlgorithm();
                            break;
                        case 'searching':
                            await runSearchingAlgorithm();
                            break;
                        case 'pathfinding':
                            await runPathfindingAlgorithm();
                            break;
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error(e);
                        showStatus('Algorithm error occurred', 'error');
                    }
                }

                state.isRunning = false;
                state.isPaused = false;
                updateButtonStates();
            }

            /**
             * Wait for delay, respecting pause state
             */
            async function waitWithPause() {
                while (state.isPaused) {
                    await sleep(50);
                    if (abortController?.signal.aborted) {
                        throw new DOMException('Aborted', 'AbortError');
                    }
                }
                
                if (abortController?.signal.aborted) {
                    throw new DOMException('Aborted', 'AbortError');
                }
                
                await sleep(state.speed);
            }

            // =====================================================
            // SORTING ALGORITHMS
            // =====================================================

            async function runSortingAlgorithm() {
                switch (state.algorithm) {
                    case 'bubble':
                        await bubbleSort();
                        break;
                    case 'selection':
                        await selectionSort();
                        break;
                    case 'insertion':
                        await insertionSort();
                        break;
                    case 'merge':
                        await mergeSort(0, state.array.length - 1);
                        break;
                    case 'quick':
                        await quickSort(0, state.array.length - 1);
                        break;
                }
                
                await celebrateSorting();
            }

            async function bubbleSort() {
                const n = state.array.length;
                
                for (let i = 0; i < n - 1; i++) {
                    updatePseudocode(0);
                    await waitWithPause();
                    
                    for (let j = 0; j < n - i - 1; j++) {
                        updatePseudocode(1);
                        
                        // Compare
                        state.comparisons++;
                        state.highlightedIndices = [j, j + 1];
                        highlightBars([j, j + 1], 'comparing');
                        updateStats();
                        saveState(2);
                        await waitWithPause();
                        
                        updatePseudocode(2);
                        
                        if (state.array[j] > state.array[j + 1]) {
                            // Swap
                            updatePseudocode(3);
                            highlightBars([j, j + 1], 'swapping');
                            await waitWithPause();
                            
                            [state.array[j], state.array[j + 1]] = [state.array[j + 1], state.array[j]];
                            state.swaps++;
                            updateStats();
                            renderBars();
                            highlightBars([j, j + 1], 'swapping');
                            saveState(3);
                            await waitWithPause();
                        }
                    }
                    
                    // Mark last element as sorted
                    markSorted([n - i - 1]);
                }
                
                markSorted([0]);
            }

            async function selectionSort() {
                const n = state.array.length;
                
                for (let i = 0; i < n - 1; i++) {
                    updatePseudocode(0);
                    let minIdx = i;
                    updatePseudocode(1);
                    await waitWithPause();
                    
                    for (let j = i + 1; j < n; j++) {
                        updatePseudocode(2);
                        
                        state.comparisons++;
                        highlightBars([minIdx, j], 'comparing');
                        updateStats();
                        saveState(3);
                        await waitWithPause();
                        
                        updatePseudocode(3);
                        if (state.array[j] < state.array[minIdx]) {
                            minIdx = j;
                            updatePseudocode(4);
                        }
                    }
                    
                    if (minIdx !== i) {
                        updatePseudocode(5);
                        highlightBars([i, minIdx], 'swapping');
                        await waitWithPause();
                        
                        [state.array[i], state.array[minIdx]] = [state.array[minIdx], state.array[i]];
                        state.swaps++;
                        updateStats();
                        renderBars();
                        saveState(5);
                        await waitWithPause();
                    }
                    
                    markSorted([i]);
                }
                
                markSorted([n - 1]);
            }

            async function insertionSort() {
                const n = state.array.length;
                
                for (let i = 1; i < n; i++) {
                    updatePseudocode(0);
                    let key = state.array[i];
                    updatePseudocode(1);
                    let j = i - 1;
                    updatePseudocode(2);
                    
                    highlightBars([i], 'comparing');
                    await waitWithPause();
                    
                    while (j >= 0 && state.array[j] > key) {
                        updatePseudocode(3);
                        state.comparisons++;
                        
                        highlightBars([j, j + 1], 'swapping');
                        await waitWithPause();
                        
                        updatePseudocode(4);
                        state.array[j + 1] = state.array[j];
                        state.swaps++;
                        updateStats();
                        renderBars();
                        saveState(4);
                        
                        updatePseudocode(5);
                        j--;
                        await waitWithPause();
                    }
                    
                    if (j >= 0) {
                        state.comparisons++;
                        updateStats();
                    }
                    
                    updatePseudocode(6);
                    state.array[j + 1] = key;
                    renderBars();
                    saveState(6);
                    await waitWithPause();
                }
                
                // Mark all as sorted
                for (let i = 0; i < n; i++) {
                    markSorted([i]);
                }
            }

            async function mergeSort(left, right) {
                if (left >= right) return;
                
                updatePseudocode(1);
                await waitWithPause();
                
                const mid = Math.floor((left + right) / 2);
                updatePseudocode(2);
                
                // Highlight the range being processed
                const range = [];
                for (let i = left; i <= right; i++) range.push(i);
                highlightBars(range, 'comparing');
                await waitWithPause();
                
                updatePseudocode(3);
                await mergeSort(left, mid);
                
                updatePseudocode(4);
                await mergeSort(mid + 1, right);
                
                updatePseudocode(5);
                await merge(left, mid, right);
            }

            async function merge(left, mid, right) {
                const leftArr = state.array.slice(left, mid + 1);
                const rightArr = state.array.slice(mid + 1, right + 1);
                
                let i = 0, j = 0, k = left;
                
                while (i < leftArr.length && j < rightArr.length) {
                    state.comparisons++;
                    highlightBars([left + i, mid + 1 + j], 'comparing');
                    updateStats();
                    await waitWithPause();
                    
                    if (leftArr[i] <= rightArr[j]) {
                        state.array[k] = leftArr[i];
                        i++;
                    } else {
                        state.array[k] = rightArr[j];
                        j++;
                    }
                    
                    highlightBars([k], 'swapping');
                    renderBars();
                    saveState(5);
                    state.swaps++;
                    updateStats();
                    k++;
                    await waitWithPause();
                }
                
                while (i < leftArr.length) {
                    state.array[k] = leftArr[i];
                    highlightBars([k], 'swapping');
                    renderBars();
                    saveState(5);
                    state.swaps++;
                    updateStats();
                    i++;
                    k++;
                    await waitWithPause();
                }
                
                while (j < rightArr.length) {
                    state.array[k] = rightArr[j];
                    highlightBars([k], 'swapping');
                    renderBars();
                    saveState(5);
                    state.swaps++;
                    updateStats();
                    j++;
                    k++;
                    await waitWithPause();
                }
                
                // Mark merged section
                if (left === 0 && right === state.array.length - 1) {
                    for (let idx = left; idx <= right; idx++) {
                        markSorted([idx]);
                    }
                }
            }

            async function quickSort(low, high) {
                if (low >= high) return;
                
                updatePseudocode(1);
                await waitWithPause();
                
                updatePseudocode(2);
                const pi = await partition(low, high);
                
                updatePseudocode(3);
                await quickSort(low, pi - 1);
                
                updatePseudocode(4);
                await quickSort(pi + 1, high);
                
                // Mark pivot as sorted when returning from recursion
                if (low === 0 && high === state.array.length - 1) {
                    for (let i = low; i <= high; i++) {
                        markSorted([i]);
                    }
                }
            }

            async function partition(low, high) {
                const pivot = state.array[high];
                let i = low - 1;
                
                // Highlight pivot
                highlightBars([high], 'searching');
                await waitWithPause();
                
                for (let j = low; j < high; j++) {
                    state.comparisons++;
                    highlightBars([j, high], 'comparing');
                    updateStats();
                    saveState(2);
                    await waitWithPause();
                    
                    if (state.array[j] < pivot) {
                        i++;
                        highlightBars([i, j], 'swapping');
                        await waitWithPause();
                        
                        [state.array[i], state.array[j]] = [state.array[j], state.array[i]];
                        state.swaps++;
                        updateStats();
                        renderBars();
                        saveState(2);
                        await waitWithPause();
                    }
                }
                
                highlightBars([i + 1, high], 'swapping');
                await waitWithPause();
                
                [state.array[i + 1], state.array[high]] = [state.array[high], state.array[i + 1]];
                state.swaps++;
                updateStats();
                renderBars();
                saveState(2);
                
                markSorted([i + 1]);
                await waitWithPause();
                
                return i + 1;
            }

            // =====================================================
            // SEARCHING ALGORITHMS
            // =====================================================

            async function runSearchingAlgorithm() {
                let target = state.searchTarget;
                
                // If no target specified, pick a random element
                if (target === null || target === undefined) {
                    target = state.array[Math.floor(Math.random() * state.array.length)];
                    state.searchTarget = target;
                    elements.searchTarget.value = target;
                }
                
                showStatus(`Searching for: ${target}`, 'info');
                
                let result;
                switch (state.algorithm) {
                    case 'linear':
                        result = await linearSearch(target);
                        break;
                    case 'binary':
                        result = await binarySearch(target);
                        break;
                }
                
                if (result !== -1) {
                    highlightBars([result], 'found');
                    showStatus(`Found ${target} at index ${result}!`, 'success');
                    triggerCelebration();
                } else {
                    highlightBars([], 'not-found');
                    const bars = elements.barsContainer.querySelectorAll('.bar');
                    bars.forEach(bar => bar.classList.add('not-found'));
                    showStatus(`${target} not found in array`, 'error');
                }
            }

            async function linearSearch(target) {
                const n = state.array.length;
                
                updatePseudocode(0);
                
                for (let i = 0; i < n; i++) {
                    updatePseudocode(1);
                    state.comparisons++;
                    highlightBars([i], 'searching');
                    updateStats();
                    saveState(2);
                    await waitWithPause();
                    
                    updatePseudocode(2);
                    if (state.array[i] === target) {
                        updatePseudocode(3);
                        return i;
                    }
                }
                
                updatePseudocode(4);
                return -1;
            }

            async function binarySearch(target) {
                let low = 0;
                let high = state.array.length - 1;
                
                updatePseudocode(1);
                await waitWithPause();
                
                while (low <= high) {
                    updatePseudocode(2);
                    
                    const mid = Math.floor((low + high) / 2);
                    updatePseudocode(3);
                    
                    state.comparisons++;
                    highlightBars([mid], 'searching');
                    
                    // Also show the current search range
                    const bars = elements.barsContainer.querySelectorAll('.bar');
                    for (let i = 0; i < bars.length; i++) {
                        if (i < low || i > high) {
                            bars[i].style.opacity = '0.3';
                        } else {
                            bars[i].style.opacity = '1';
                        }
                    }
                    
                    updateStats();
                    saveState(4);
                    await waitWithPause();
                    
                    updatePseudocode(4);
                    if (state.array[mid] === target) {
                        // Reset opacity
                        bars.forEach(bar => bar.style.opacity = '1');
                        return mid;
                    }
                    
                    updatePseudocode(5);
                    if (state.array[mid] < target) {
                        low = mid + 1;
                    } else {
                        updatePseudocode(6);
                        high = mid - 1;
                    }
                    
                    await waitWithPause();
                }
                
                // Reset opacity
                const bars = elements.barsContainer.querySelectorAll('.bar');
                bars.forEach(bar => bar.style.opacity = '1');
                
                updatePseudocode(7);
                return -1;
            }

            // =====================================================
            // PATHFINDING ALGORITHMS
            // =====================================================

            async function runPathfindingAlgorithm() {
                clearGridPath();
                
                switch (state.algorithm) {
                    case 'bfs':
                        await bfs();
                        break;
                    case 'dfs':
                        await dfs();
                        break;
                }
            }

            async function bfs() {
                const queue = [{ ...state.startPos, path: [{ ...state.startPos }] }];
                const visited = new Set();
                visited.add(`${state.startPos.row},${state.startPos.col}`);
                
                updatePseudocode(1);
                saveState(1);
                await waitWithPause();
                
                updatePseudocode(2);
                await waitWithPause();
                
                while (queue.length > 0) {
                    updatePseudocode(3);
                    
                    const current = queue.shift();
                    updatePseudocode(4);
                    
                    state.currentCell = { row: current.row, col: current.col };
                    state.comparisons++;
                    updateStats();
                    updateGridDisplay();
                    saveState(4);
                    await waitWithPause();
                    
                    // Check if reached end
                    updatePseudocode(5);
                    if (current.row === state.endPos.row && current.col === state.endPos.col) {
                        // Found path - animate it
                        state.pathCells = current.path;
                        state.currentCell = null;
                        updateGridDisplay();
                        showStatus(`Path found! Length: ${current.path.length}`, 'success');
                        triggerCelebration();
                        return;
                    }
                    
                    // Add to visited visualization
                    if (!(current.row === state.startPos.row && current.col === state.startPos.col)) {
                        state.visitedCells.push({ row: current.row, col: current.col });
                    }
                    
                    // Explore neighbors
                    updatePseudocode(6);
                    const neighbors = getNeighbors(current.row, current.col);
                    
                    for (const neighbor of neighbors) {
                        const key = `${neighbor.row},${neighbor.col}`;
                        
                        updatePseudocode(7);
                        if (!visited.has(key)) {
                            visited.add(key);
                            updatePseudocode(8);
                            
                            updatePseudocode(9);
                            queue.push({
                                ...neighbor,
                                path: [...current.path, neighbor]
                            });
                            state.swaps++;
                            updateStats();
                        }
                    }
                    
                    state.currentCell = null;
                    updateGridDisplay();
                }
                
                showStatus('No path found!', 'error');
            }

            async function dfs() {
                const visited = new Set();
                const path = [];
                
                updatePseudocode(0);
                
                const found = await dfsRecursive(state.startPos.row, state.startPos.col, visited, path);
                
                if (found) {
                    state.pathCells = path;
                    state.currentCell = null;
                    updateGridDisplay();
                    showStatus(`Path found! Length: ${path.length}`, 'success');
                    triggerCelebration();
                } else {
                    showStatus('No path found!', 'error');
                }
            }

            async function dfsRecursive(row, col, visited, path) {
                const key = `${row},${col}`;
                
                updatePseudocode(1);
                visited.add(key);
                path.push({ row, col });
                
                state.currentCell = { row, col };
                state.comparisons++;
                updateStats();
                
                if (!(row === state.startPos.row && col === state.startPos.col)) {
                    state.visitedCells.push({ row, col });
                }
                
                updateGridDisplay();
                saveState(1);
                await waitWithPause();
                
                // Check if reached end
                updatePseudocode(2);
                if (row === state.endPos.row && col === state.endPos.col) {
                    return true;
                }
                
                // Explore neighbors
                updatePseudocode(3);
                const neighbors = getNeighbors(row, col);
                
                for (const neighbor of neighbors) {
                    const neighborKey = `${neighbor.row},${neighbor.col}`;
                    
                    updatePseudocode(4);
                    if (!visited.has(neighborKey)) {
                        updatePseudocode(5);
                        state.swaps++;
                        updateStats();
                        
                        if (await dfsRecursive(neighbor.row, neighbor.col, visited, path)) {
                            return true;
                        }
                    }
                }
                
                // Backtrack
                path.pop();
                updatePseudocode(6);
                return false;
            }

            function getNeighbors(row, col) {
                const directions = [
                    { row: -1, col: 0 }, // up
                    { row: 1, col: 0 },  // down
                    { row: 0, col: -1 }, // left
                    { row: 0, col: 1 }   // right
                ];
                
                const neighbors = [];
                
                for (const dir of directions) {
                    const newRow = row + dir.row;
                    const newCol = col + dir.col;
                    
                    if (
                        newRow >= 0 && newRow < state.gridSize &&
                        newCol >= 0 && newCol < state.gridSize &&
                        state.grid[newRow][newCol] !== 1
                    ) {
                        neighbors.push({ row: newRow, col: newCol });
                    }
                }
                
                return neighbors;
            }

            // =====================================================
            // SINGLE STEP EXECUTION
            // =====================================================

            let stepGenerator = null;

            async function runSingleStep() {
                // For simplicity, single step just plays and immediately pauses
                // A full implementation would use generators for true step-by-step
                showStatus('Step forward - use Play for continuous execution', 'info');
            }

            // =====================================================
            // CELEBRATION ANIMATIONS
            // =====================================================

            async function celebrateSorting() {
                const bars = elements.barsContainer.querySelectorAll('.bar');
                
                // Sequential green wave
                for (let i = 0; i < bars.length; i++) {
                    bars[i].classList.remove('comparing', 'swapping', 'searching');
                    bars[i].classList.add('sorted');
                    await sleep(20);
                }
                
                showStatus('Sorting complete!', 'success');
                triggerCelebration();
            }

            function triggerCelebration() {
                const colors = ['#22c55e', '#3b82f6', '#8b5cf6', '#ec4899', '#fbbf24', '#06b6d4'];
                const overlay = elements.celebrationOverlay;
                
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = `${Math.random() * 100}%`;
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = `${Math.random() * 0.5}s`;
                    confetti.style.animationDuration = `${2 + Math.random() * 2}s`;
                    overlay.appendChild(confetti);
                    
                    // Remove after animation
                    setTimeout(() => confetti.remove(), 4000);
                }
            }

            // =====================================================
            // INITIALIZE
            // =====================================================

            // Start the application
            init();

            // Expose for debugging (optional)
            return {
                state,
                reset,
                generateNewArray
            };
        })();
    </script>
</body>
</html>
