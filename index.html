<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🎯</span>
                    <h1>Algorithm Visualizer</h1>
                </div>
                <nav class="tabs">
                    <button class="tab active" data-tab="sort">
                        <span class="tab-icon">📊</span>
                        <span class="tab-text">Sorting</span>
                    </button>
                    <button class="tab" data-tab="search">
                        <span class="tab-icon">🔍</span>
                        <span class="tab-text">Searching</span>
                    </button>
                    <button class="tab" data-tab="path">
                        <span class="tab-icon">🗺️</span>
                        <span class="tab-text">Pathfinding</span>
                    </button>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Visualization Stage -->
            <section class="visualization-stage">
                <div class="stage-header">
                    <h2 class="stage-title" id="stageTitle">Bubble Sort</h2>
                    <div class="stage-status">
                        <span class="status-badge" id="statusBadge">Ready</span>
                    </div>
                </div>
                
                <!-- Sorting/Searching Visualization -->
                <div class="bars-container" id="barsContainer">
                    <div class="bars-wrapper" id="barsWrapper"></div>
                    <div class="array-values" id="arrayValues"></div>
                </div>
                
                <!-- Pathfinding Canvas -->
                <div class="canvas-container" id="canvasContainer" style="display: none;">
                    <canvas id="pathCanvas"></canvas>
                    <div class="canvas-legend">
                        <div class="legend-item">
                            <span class="legend-color" style="background: #22c55e;"></span>
                            <span>Start</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #ef4444;"></span>
                            <span>End</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #334155;"></span>
                            <span>Wall</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #38bdf8;"></span>
                            <span>Visited</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #eab308;"></span>
                            <span>Path</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Info Panel -->
            <aside class="info-panel">
                <!-- Complexity Info -->
                <div class="info-card">
                    <h3 class="info-card-title">
                        <span class="info-icon">📊</span>
                        Complexity Analysis
                    </h3>
                    <div class="complexity-grid">
                        <div class="complexity-item">
                            <span class="complexity-label">Time (Best)</span>
                            <span class="complexity-value" id="timeBest">O(n)</span>
                        </div>
                        <div class="complexity-item">
                            <span class="complexity-label">Time (Avg)</span>
                            <span class="complexity-value" id="timeAvg">O(n²)</span>
                        </div>
                        <div class="complexity-item">
                            <span class="complexity-label">Time (Worst)</span>
                            <span class="complexity-value" id="timeWorst">O(n²)</span>
                        </div>
                        <div class="complexity-item">
                            <span class="complexity-label">Space</span>
                            <span class="complexity-value" id="spaceComplexity">O(1)</span>
                        </div>
                    </div>
                </div>

                <!-- Statistics -->
                <div class="info-card">
                    <h3 class="info-card-title">
                        <span class="info-icon">📈</span>
                        Live Statistics
                    </h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-icon">🔄</span>
                            <div class="stat-content">
                                <span class="stat-value" id="comparisons">0</span>
                                <span class="stat-label">Comparisons</span>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">🔁</span>
                            <div class="stat-content">
                                <span class="stat-value" id="swaps">0</span>
                                <span class="stat-label">Swaps</span>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">📥</span>
                            <div class="stat-content">
                                <span class="stat-value" id="accesses">0</span>
                                <span class="stat-label">Array Accesses</span>
                            </div>
                        </div>
                        <div class="stat-item" id="nodesVisitedContainer">
                            <span class="stat-icon">🔍</span>
                            <div class="stat-content">
                                <span class="stat-value" id="nodesVisited">0</span>
                                <span class="stat-label">Nodes Visited</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pseudocode -->
                <div class="info-card pseudocode-card">
                    <h3 class="info-card-title">
                        <span class="info-icon">📝</span>
                        Pseudocode
                    </h3>
                    <div class="pseudocode-container" id="pseudocodeContainer">
                        <pre class="pseudocode" id="pseudocode"></pre>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Controls -->
        <footer class="controls-panel">
            <div class="controls-row">
                <!-- Playback Controls -->
                <div class="control-group playback-controls">
                    <button class="control-btn" id="stepBackBtn" title="Step Back">
                        <span>⏮️</span>
                    </button>
                    <button class="control-btn" id="prevBtn" title="Previous">
                        <span>◀️</span>
                    </button>
                    <button class="control-btn primary" id="playPauseBtn" title="Play/Pause">
                        <span id="playPauseIcon">▶️</span>
                    </button>
                    <button class="control-btn" id="nextBtn" title="Next">
                        <span>▶️</span>
                    </button>
                    <button class="control-btn" id="stepForwardBtn" title="Step Forward">
                        <span>⏭️</span>
                    </button>
                    <button class="control-btn danger" id="resetBtn" title="Reset">
                        <span>🔄</span>
                    </button>
                </div>

                <!-- Algorithm Selection -->
                <div class="control-group algorithm-controls">
                    <label class="control-label">Algorithm</label>
                    <select class="control-select" id="algorithmSelect">
                        <optgroup label="Sorting" id="sortingOptions">
                            <option value="bubble">Bubble Sort</option>
                            <option value="selection">Selection Sort</option>
                            <option value="insertion">Insertion Sort</option>
                            <option value="quick">Quick Sort</option>
                            <option value="merge">Merge Sort</option>
                        </optgroup>
                    </select>
                </div>

                <!-- Speed Control -->
                <div class="control-group slider-group">
                    <label class="control-label">Speed: <span id="speedValue">100</span>ms</label>
                    <input type="range" class="control-slider" id="speedSlider" min="10" max="500" value="100">
                </div>

                <!-- Size Control (for Sort/Search) -->
                <div class="control-group slider-group" id="sizeControl">
                    <label class="control-label">Size: <span id="sizeValue">30</span></label>
                    <input type="range" class="control-slider" id="sizeSlider" min="10" max="100" value="30">
                </div>

                <!-- Array Generation -->
                <div class="control-group" id="arrayControls">
                    <button class="control-btn secondary" id="generateBtn">
                        <span>🎲</span>
                        <span class="btn-text">Generate</span>
                    </button>
                </div>

                <!-- Custom Input -->
                <div class="control-group custom-input-group" id="customInputGroup">
                    <input type="text" class="control-input" id="customInput" placeholder="e.g., 5, 2, 8, 1, 9">
                    <button class="control-btn secondary" id="customInputBtn">
                        <span>✏️</span>
                        <span class="btn-text">Apply</span>
                    </button>
                </div>

                <!-- Search Target (for Search tab) -->
                <div class="control-group" id="searchTargetGroup" style="display: none;">
                    <label class="control-label">Search for:</label>
                    <input type="number" class="control-input" id="searchTarget" value="50" min="1" max="100">
                </div>

                <!-- Pathfinding Mode Controls -->
                <div class="control-group pathfinding-modes" id="pathfindingModes" style="display: none;">
                    <button class="mode-btn active" data-mode="wall" id="wallModeBtn">
                        <span>🧱</span>
                        <span class="btn-text">Draw Wall</span>
                    </button>
                    <button class="mode-btn" data-mode="start" id="startModeBtn">
                        <span>🟢</span>
                        <span class="btn-text">Move Start</span>
                    </button>
                    <button class="mode-btn" data-mode="end" id="endModeBtn">
                        <span>🔴</span>
                        <span class="btn-text">Move End</span>
                    </button>
                    <button class="control-btn secondary" id="clearGridBtn">
                        <span>🧹</span>
                        <span class="btn-text">Clear Grid</span>
                    </button>
                    <button class="control-btn secondary" id="generateMazeBtn">
                        <span>🌀</span>
                        <span class="btn-text">Generate Maze</span>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
